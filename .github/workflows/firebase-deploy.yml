name: Firebase Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: backend/functions

      - name: Prepare frontend environment
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "VITE_FIREBASE_CONFIG=${VITE_FIREBASE_CONFIG}" > frontend/.env
          echo "VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}" >> frontend/.env
          echo "VITE_API_URL=${VITE_API_URL}" >> frontend/.env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> frontend/.env
          echo "FCM_SERVER_KEY=not_required_when_using_admin_sdk" >> frontend/.env

      - name: Prepare functions environment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > backend/functions/.env
          echo "FCM_SERVER_KEY=not_required_when_using_admin_sdk" >> backend/functions/.env
          echo "PROJECT_ID=lifeline-ai-67fac" >> backend/functions/.env

      - name: Build frontend
        run: npm run build --workspace frontend

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_PROJECT: lifeline-ai-67fac
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [[ "$FIREBASE_SERVICE_ACCOUNT" == {* ]]; then
            echo "Using FIREBASE_SERVICE_ACCOUNT as JSON" > firebase-debug.log
            echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --non-interactive --debug >> firebase-debug.log 2>&1 || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --non-interactive --debug >> firebase-debug.log 2>&1
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN" > firebase-debug.log
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --token "$FIREBASE_TOKEN" --non-interactive --debug >> firebase-debug.log 2>&1 || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --token "$FIREBASE_TOKEN" --non-interactive --debug >> firebase-debug.log 2>&1
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT is not JSON, treating as token" > firebase-debug.log
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --token "$FIREBASE_SERVICE_ACCOUNT" --non-interactive --debug >> firebase-debug.log 2>&1 || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --token "$FIREBASE_SERVICE_ACCOUNT" --non-interactive --debug >> firebase-debug.log 2>&1
          else
            echo "No Firebase credentials found!" > firebase-debug.log
            exit 1
          fi

      - name: Commit debug log
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add firebase-debug.log
          git commit -m "chore: add firebase debug log [skip ci]" || echo "No changes to commit"
          git push
