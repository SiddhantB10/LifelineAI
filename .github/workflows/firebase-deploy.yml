name: Firebase Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: backend/functions

      - name: Prepare frontend environment
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "VITE_FIREBASE_CONFIG=${VITE_FIREBASE_CONFIG}" > frontend/.env
          echo "VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}" >> frontend/.env
          echo "VITE_API_URL=${VITE_API_URL}" >> frontend/.env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> frontend/.env
          echo "FCM_SERVER_KEY=not_required_when_using_admin_sdk" >> frontend/.env

      - name: Prepare functions environment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > backend/functions/.env
          echo "FCM_SERVER_KEY=not_required_when_using_admin_sdk" >> backend/functions/.env
          echo "PROJECT_ID=lifeline-ai-67fac" >> backend/functions/.env

      - name: Build frontend
        run: npm run build --workspace frontend

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_PROJECT: lifeline-ai-67fac
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_LIFELINE_AI_67FAC: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LIFELINE_AI_67FAC }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          SA="$FIREBASE_SERVICE_ACCOUNT"
          if [ -z "$SA" ]; then SA="$FIREBASE_SERVICE_ACCOUNT_LIFELINE_AI_67FAC"; fi
          if [ -z "$SA" ]; then SA="$GCP_SA_KEY"; fi
          
          if [[ "$SA" == {* ]]; then
            echo "Using Service Account JSON"
            echo "$SA" > "$RUNNER_TEMP/firebase-service-account.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --non-interactive || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --non-interactive
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN"
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --token "$FIREBASE_TOKEN" --non-interactive || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --token "$FIREBASE_TOKEN" --non-interactive
          elif [ -n "$SA" ]; then
            echo "Service account is not JSON, treating as token"
            firebase deploy --project "$FIREBASE_PROJECT" --only functions,hosting:web --token "$SA" --non-interactive || firebase deploy --project "$FIREBASE_PROJECT" --only hosting:web --token "$SA" --non-interactive
          else
            echo "No Firebase credentials found in any known secret variable!"
            exit 1
          fi
