name: lifeline_ai_mobile
description: Lifeline AI - Emergency Response Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase SDK
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0

  # UI & Navigation
  get: ^4.6.0
  go_router: ^12.0.0
  flutter_svg: ^2.0.0
  google_fonts: ^6.1.0

  # Maps
  google_maps_flutter: ^2.5.0
  location: ^5.0.0
  geolocator: ^10.1.0

  # Forms & Validation
  form_builder_validators: ^9.1.0
  flutter_form_builder: ^9.1.0

  # Real-time Communication
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.1.0
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
          weight: 600
